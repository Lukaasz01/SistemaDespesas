<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finova - Dashboard</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<!-- O wrapper substitui o body para funcionar bem no Angular -->
<div class="dashboard-wrapper">

  <div class="sidebar d-flex flex-column" id="sidebar" [class.show]="menuAberto">
    <div class="sidebar-brand">
      <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
        <i class="bi bi-wallet2 fs-5"></i>
      </div>
      Finova
    </div>

    <div class="flex-grow-1 mt-4">
      <p class="text-white-50 small text-uppercase px-4 mb-2" style="font-size: 0.75rem; letter-spacing: 1px;">Menu Principal</p>

      <a routerLink="/home" class="nav-link-custom" routerLinkActive="active">
        <i class="bi bi-grid-1x2-fill"></i>
        Dashboard
      </a>

      <a routerLink="/categorias" class="nav-link-custom" routerLinkActive="active">
        <i class="bi bi-tags"></i>
        Categorias
      </a>

    </div>

    <div class="mt-auto mb-4">
      <a routerLink="/configuracoes" class="nav-link-custom text-white-50 mt-1">
        <i class="bi bi-gear"></i>
        Configurações
      </a>
      <a routerLink="/login" class="nav-link-custom text-white-50 mt-1">
        <i class="bi bi-box-arrow-right"></i>
        Terminar Sessão
      </a>
    </div>
  </div>

  <div class="main-content" id="mainContent">

    <header class="top-navbar">
      <div class="d-flex align-items-center">
        <button class="btn btn-light d-md-none me-2" (click)="toggleMenu()">
          <i class="bi bi-list fs-4"></i>
        </button>
        <h4 class="mb-0 fw-bold text-dark d-none d-md-block">Visão Geral</h4>
      </div>

    </header>

    <div class="content-padding">
    </div>

  </div>
</div>

<!-- Script simples para o toggle do menu mobile -->
<script>
  document.getElementById('sidebarToggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('show');
  });
</script>
</body>
</html>
