<form>
    <label>Nome de Usuário:</label>
    <br>
    <input type="text" name="nome" [(ngModel)]="nome"><p>{{nome}}</p>
    <br><br>

    <label>E-mail:</label>
    <br>
    <input type="text" name="email" [(ngModel)]="email"><p>{{email}}</p>
    <br><br>

    <label>Senha:</label>
    <br>
    <input type="password" name="password" [(ngModel)]="password"><p>{{password}}</p>
    <br><br>

    <button type="button" (click)="cadastrar()">Cadastrar</button>
</form>
