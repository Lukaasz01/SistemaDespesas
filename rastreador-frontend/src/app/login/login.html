<div>
    <h1>bem vindo ao sistema teste</h1>
    <label>Email ou Usuário</label>

    <input type="password" id="password" [(ngModel)]="password">

    <button (click)="logar()">Logar</button>

    <p>{{identifier}}</p>
    <p>{{password}}</p>
</div>
