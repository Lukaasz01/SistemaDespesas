<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* Fundo com gradiente moderno */
    body {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Estilo do cartão principal */
    .login-card {
        background-color: rgba(255, 255, 255, 0.98);
        border-radius: 1.5rem;
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 420px;
        overflow: hidden;
    }

    /* Cabeçalho do cartão com pequeno destaque de cor */
    .card-header-accent {
        height: 6px;
        background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
        width: 100%;
    }

    /* Botão principal customizado */
    .btn-primary-custom {
        background: linear-gradient(90deg, #0072ff 0%, #00c6ff 100%);
        border: none;
        color: white;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.5rem 1rem rgba(0, 114, 255, 0.3);
        color: white;
    }

    /* Inputs customizados */
    .form-control:focus {
        border-color: #0072ff;
        box-shadow: 0 0 0 0.25rem rgba(0, 114, 255, 0.15);
    }

    /* Botão de ver palavra-passe alinhado no floating label */
    .password-toggle {
        position: absolute;
        top: 50%;
        right: 1rem;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #6c757d;
        z-index: 5; /* Para ficar acima do input */
        padding: 0;
    }
    .password-toggle:hover {
        color: #0072ff;
    }

    /* Redes sociais */
    .social-btn {
        border: 1px solid #dee2e6;
        background-color: white;
        color: #495057;
        font-weight: 500;
        transition: all 0.2s;
    }
    .social-btn:hover {
        background-color: #f8f9fa;
        border-color: #c1c9d0;
    }
  </style>
</head>
<body>

<div class="container d-flex justify-content-center p-3">
  <div class="login-card">
    <div class="card-header-accent"></div>

    <div class="p-4 p-md-5">
      <!-- Logótipo e Título -->
      <div class="text-center mb-4">
        <div
          class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-3"
          style="width: 60px; height: 60px;">
          <i class="bi bi-wallet2 fs-2 text-primary"></i>
        </div>
        <h2 class="fw-bold mb-1">SpendUp</h2>
        <p class="text-muted small">Seu prórpio Sistema para Administração de suas Despesas</p>
      </div>

      <!-- Formulário com Floating Labels -->
      <form>

        <!-- E-mail ou Usuário -->
        <div class="form-floating mb-3">
          <input type="text" class="form-control rounded-3" id="identifier" name="identifier" [(ngModel)]="identifier"
                 placeholder="E-mail ou Usuário" required>
          <label for="identifier" class="text-muted">
            <i class="bi bi-person me-2"></i>E-mail ou Usuário
          </label>
        </div>

        <!-- Palavra-passe -->
        <div class="form-floating mb-3 position-relative">
          <input type="password" class="form-control rounded-3 pe-5" id="password" name="password"
                 [(ngModel)]="password" placeholder="Palavra-passe" required>
          <label for="password" class="text-muted">
            <i class="bi bi-lock me-2"></i>Palavra-passe
          </label>
          <button type="button" class="password-toggle" onclick="togglePassword()"
                  aria-label="Mostrar ou ocultar palavra-passe">
            <i class="bi bi-eye" id="togglePasswordIcon"></i>
          </button>
        </div>

        <!-- Opções extras -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
            <label class="form-check-label text-muted small" for="rememberMe" style="cursor: pointer;">
              Manter sessão
            </label>
          </div>
          <a href="#" class="text-decoration-none small fw-semibold" style="color: #0072ff;">
            Esqueceu-se?
          </a>
        </div>

        <!-- Botão Submeter -->
        <button type="button" (click)="logar()" id="btnLogin"
                class="btn btn-primary-custom w-100 py-3 rounded-3 mb-4 d-flex justify-content-center align-items-center gap-2">
          <span>Iniciar sessão</span>
          <i class="bi bi-box-arrow-in-right"></i>
        </button>

      </form>

      <!-- Divisor -->
      <div class="position-relative text-center mb-4">
        <hr class="text-muted opacity-25">
        <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">
            ou iniciar com
        </span>
      </div>

      <!-- Botões Sociais -->
      <div class="row g-2 mb-4">
        <div class="col-6">
          <button type="button"
                  class="btn social-btn w-100 py-2 rounded-3 d-flex align-items-center justify-content-center gap-2 small">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"/>
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"/>
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05"/>
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"/>
            </svg>
            Google
          </button>
        </div>
        <div class="col-6">
          <button type="button"
                  class="btn social-btn w-100 py-2 rounded-3 d-flex align-items-center justify-content-center gap-2 small">
            <i class="bi bi-github fs-5 text-dark"></i>
            GitHub
          </button>
        </div>
      </div>

      <!-- Rodapé -->
      <p class="text-center text-muted small mb-0">
        Novo na plataforma?
        <a href="#" class="text-decoration-none fw-semibold" style="color: #0072ff;">
          Criar conta gratuitamente
        </a>
      </p>
    </div>
  </div>
</div>

<!-- Script simulando o Angular -->
<script>
  function togglePassword() {
      const passwordInput = document.getElementById('password');
      const icon = document.getElementById('togglePasswordIcon');

      if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          icon.classList.remove('bi-eye');
          icon.classList.add('bi-eye-slash');
      } else {
          passwordInput.type = 'password';
          icon.classList.remove('bi-eye-slash');
          icon.classList.add('bi-eye');
      }
  }
</script>
</body>
</html>
